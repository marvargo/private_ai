name: Docker Llama 405B Runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/docker/llama405b/**'
      - '.github/workflows/docker-llama405b.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-llama405b-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-llama405b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image locally with Dockerfile smoke checks
        uses: docker/build-push-action@v6
        with:
          context: infra/docker/llama405b
          load: true
          tags: llama405b-vllm:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate effective startup metadata
        run: |
          set -euo pipefail
          metadata=$(docker inspect llama405b-vllm:ci --format 'Entrypoint={{json .Config.Entrypoint}} Cmd={{json .Config.Cmd}}')
          echo "$metadata"
          test "$metadata" = 'Entrypoint=null Cmd=["/opt/wyndme/supervisor.py"]'
          docker run --rm --entrypoint bash llama405b-vllm:ci -n /opt/wyndme/start-vllm.sh
          docker run --rm --entrypoint python3 llama405b-vllm:ci -c 'import vllm; import huggingface_hub; print("imports ok")'
      - name: Push runtime image after startup checks pass
        uses: docker/build-push-action@v6
        with:
          context: infra/docker/llama405b
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/llama405b-vllm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect published image metadata
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/llama405b-vllm:latest
