name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan
        run: |
          ! git grep -nE 'github_pat_|ghp_|hf_[A-Za-z0-9_]{20,}|sb_secret_|sk-[A-Za-z0-9_-]{20,}' -- ':!.github/workflows/ci.yml'

      - name: Migration check
        run: test -d supabase/migrations && find supabase/migrations -type f -name '*.sql' -print -quit

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
