name: Docker Qwen Coder Runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/docker/qwencoder/**'
      - '.github/workflows/docker-qwen-coder.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-qwen-coder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-qwen-coder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, smoke test in Dockerfile, and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: infra/docker/qwencoder
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qwen-coder-vllm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect published image metadata
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/qwen-coder-vllm:latest
          echo 'Expected effective Entrypoint=[] Cmd=["/opt/wyndme/supervisor.py"] from Dockerfile; Dockerfile build already validates shell/Python/vLLM/huggingface_hub imports before push.'
